<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - AI Career Guidance</title>
    <!-- Confetti Library for the Birthday Blast Effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #ffcc00;
            --bg: #0b0f19;
            --text: #e2e8f0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text);
            transition: opacity 0.5s ease;
        }

        /* Ambient Spotlight Background */
        body::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vmin;
            height: 80vmin;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.25) 0%, rgba(11, 15, 25, 0) 70%);
            z-index: 0;
            animation: pulse-spotlight 3s ease-in-out infinite alternate;
        }

        @keyframes pulse-spotlight {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* Logo Container */
        .logo-container {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            animation: pop-in 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes pop-in {
            to { opacity: 1; transform: scale(1); }
        }

        /* 3D Glowing Logo Box */
        .logo-icon {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0, 242, 254, 0.5), inset 0 0 20px rgba(255,255,255,0.4);
            position: relative;
            transform-style: preserve-3d;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        /* Rotating Neon Border */
        .logo-icon::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 40px;
            border: 2px dashed rgba(255, 204, 0, 0.8);
            animation: spin-border 8s linear infinite;
        }

        @keyframes spin-border {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-icon img {
            width: 75px;
            height: 75px;
            filter: brightness(0) invert(1) drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* Typography */
        .brand-text {
            color: #fff;
        }

        .brand-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ffffff, var(--primary), var(--accent), #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            margin-bottom: 8px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .tagline {
            font-size: 16px;
            color: #94a3b8;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0;
            animation: fade-up 1s ease forwards 0.8s;
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-icon">
            <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/icons/brain-circuit.svg" alt="AI Brain Logo">
        </div>
        <div class="brand-text">
            <div class="brand-name">AI Career Guide</div>
            <div class="tagline">Empowering Your Future</div>
        </div>
    </div>

    <script>
        // Start the Birthday Blast Confetti Ribbon Effect
        function runConfetti() {
            var duration = 2.5 * 1000;
            var end = Date.now() + duration;

            // Continuous side cannons
            (function frame() {
                confetti({
                    particleCount: 6,
                    angle: 60,
                    spread: 60,
                    origin: { x: 0 },
                    colors: ['#00f2fe', '#4facfe', '#ffcc00', '#ff007a', '#a855f7', '#ffffff']
                });
                confetti({
                    particleCount: 6,
                    angle: 120,
                    spread: 60,
                    origin: { x: 1 },
                    colors: ['#00f2fe', '#4facfe', '#ffcc00', '#ff007a', '#a855f7', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // Big center explosion at the start
            setTimeout(() => {
                confetti({
                    particleCount: 200,
                    spread: 120,
                    origin: { y: 0.6 },
                    colors: ['#00f2fe', '#4facfe', '#ffcc00', '#ffffff', '#ff007a']
                });
            }, 300);
        }

        // Run the confetti animation
        runConfetti();

        // Redirect to Index Page after exactly 3.5 seconds (gives time for fade out)
        setTimeout(() => {
            // Fade out the page
            document.body.style.opacity = '0';
            
            // Redirect after fade out completes
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500); // 500ms for fade out transition
        }, 3000); // Waits 3 seconds before fading out
    </script>
</body>
</html>
